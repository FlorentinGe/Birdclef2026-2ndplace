# Supervised training stage defaults.
# These are the exp16/exp18 base settings.
# Backbone YAMLs override any value here as needed.
#
# num_epochs is intentionally absent: backbone YAMLs own the epoch count
# (ViT=40, NFnet/EffV2/RegNet=20, ConvNeXt/B4=25). Stage YAML previously
# set 20 here, which silently overrode backbone values — removed to fix that.

stage: supervised
batch_size: 32
focal_val_frac: 0.1
soundscape_val_frac: 0.15
mixup_prob: 0.5
grad_clip: 1.0
